{% extends "base.html" %}
{% block title %}Delete Vehicle{% endblock %}

{% block content %}

<style>

.delete-wrapper{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.delete-card{
    width:420px;
    padding:40px;
    border-radius:28px;

    background:
    linear-gradient(
    145deg,
    #0f172a,
    #111827,
    #312e81
    );

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 20px 50px rgba(0,0,0,.45);

    text-align:center;

    position:relative;
    overflow:hidden;
}

.delete-card::before{
    content:"";
    position:absolute;
    top:-80px;
    right:-80px;
    width:220px;
    height:220px;

    background:
    radial-gradient(circle,
    rgba(124,58,237,.35),
    transparent 70%);
}

.delete-icon{
    font-size:55px;
    margin-bottom:18px;
}

.delete-title{
    font-size:30px;
    font-weight:800;
    margin-bottom:12px;

    background:
    linear-gradient(90deg,#ffffff,#8b5cf6,#3b82f6);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.delete-text{
    color:#cbd5e1;
    line-height:1.7;
    margin-bottom:30px;
}

.vehicle-name{
    color:white;
    font-weight:700;
}

.action-group{
    display:flex;
    gap:14px;
}

.action-group button,
.action-group a{
    flex:1;
    padding:14px;
    border:none;
    border-radius:16px;
    font-weight:700;
    cursor:pointer;
    text-decoration:none;
    transition:.3s;
}

.delete-btn{
    background:
    linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
}

.delete-btn:hover{
    transform:translateY(-3px);
}

.cancel-btn{
    background:
    rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    color:white;
}

.cancel-btn:hover{
    background:
    rgba(255,255,255,.14);
}

</style>

<div class="delete-wrapper">

    <div class="delete-card">

        <div class="delete-icon">⚠️</div>

        <div class="delete-title">
            Delete Vehicle
        </div>

        <div class="delete-text">
            Are you sure you want to remove
            <br>
            <span class="vehicle-name">
                {{ vehicle.name }}
            </span>
            from the showroom?
        </div>

        <form method="post">

            {% csrf_token %}

            <div class="action-group">

                <button type="submit"
                        class="delete-btn">
                    Yes Delete
                </button>

                <a href="/vehicles/"
                   class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
